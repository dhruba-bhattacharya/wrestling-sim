<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ultimate Wrestling Simulator</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar panel">
      <div>
        <p class="eyebrow">All Elite Wrestling</p>
        <h1>Ultimate Wrestling Simulator</h1>
      </div>
      <div class="actions">
        <button id="refresh-btn" class="ghost">Refresh</button>
        <button id="play-btn" class="primary">Simulate Next Show</button>
        <button id="reset-btn" class="danger">Reset Save</button>
      </div>
    </header>

    <section id="meta" class="kpi-grid"></section>

    <main class="layout-grid">
      <section class="panel span-2">
        <div class="section-title-row">
          <h2>Feud Setup</h2>
          <p class="muted">Start rivalries to influence auto-booking.</p>
        </div>
        <div id="feud-options" class="stack"></div>
      </section>

      <section class="panel">
        <h2>Active Rivalries</h2>
        <ul id="rivalries" class="stack"></ul>
      </section>

      <section class="panel span-3">
        <h2>Latest Show Result</h2>
        <div id="show-result" class="card muted">Simulate a show to generate a full card.</div>
      </section>

      <section class="panel span-3">
        <h2>Roster Snapshot</h2>
        <table>
          <thead>
            <tr><th>Name</th><th>Popularity</th><th>Stamina</th><th>Alignment</th><th>Injury</th></tr>
          </thead>
          <tbody id="roster"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>

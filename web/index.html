<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ultimate Wrestling Simulator</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="panel splash-panel">
      <div class="brand-wrap">
        <p class="tiny">Ultimate Wrestling Experience</p>
        <h1 class="logo"><span>SUPER</span>BOOKED</h1>
        <p class="subtitle">WRESTLING BOOKING SIMULATOR</p>
      </div>
      <div class="control-row">
        <button id="refresh-btn" class="icon-btn">⟳</button>
        <button id="play-btn" class="primary-btn">PLAY SHOW</button>
        <button id="reset-btn" class="icon-btn danger">⭮</button>
      </div>
      <p class="version">v0.2</p>
    </section>

    <section class="panel booker-panel">
      <div class="topline">
        <div>
          <p class="company">ALL ELITE WRESTLING</p>
          <h2 id="meta-week">WEEK 1</h2>
          <p id="meta-event" class="muted">AEW Dynamite</p>
        </div>
        <div class="menu">☰</div>
      </div>

      <nav class="menu-row">
        <span class="active">BOOK SHOW</span>
        <span>MANAGE ROSTER</span>
        <span>NEWS</span>
      </nav>

      <section>
        <div id="meta-kpis" class="kpi-row"></div>
      </section>

      <section>
        <div class="slot-title">AUTO BOOKED CARD</div>
        <div id="booking-grid" class="booking-grid"></div>
      </section>

      <section class="bottom-grid">
        <div>
          <div class="slot-title">FEUD OPTIONS</div>
          <div id="feud-options" class="list"></div>
        </div>
        <div>
          <div class="slot-title">ACTIVE RIVALRIES</div>
          <ul id="rivalries" class="list rivalry-list"></ul>
        </div>
      </section>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
